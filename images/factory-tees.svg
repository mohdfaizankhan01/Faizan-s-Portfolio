<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 180" width="580" height="180" role="img" aria-label="Plain English to SQL query to database results illustration">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.6" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glowC" cx="15%" cy="25%" r="60%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.28"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowV" cx="88%" cy="85%" r="65%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.30"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="29" height="29" patternUnits="userSpaceOnUse">
      <path d="M29 0H0V29" fill="none" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.09"/>
    </pattern>
  </defs>

  <rect width="580" height="180" fill="#0a0a16"/>
  <rect width="580" height="180" fill="url(#glowC)"/>
  <rect width="580" height="180" fill="url(#glowV)"/>
  <rect width="580" height="180" fill="url(#grid)"/>

  <!-- plain-English chat bubble (left) -->
  <path d="M40 46 h132 a12 12 0 0 1 12 12 v50 a12 12 0 0 1 -12 12 h-96 l-18 18 v-18 h-18 a12 12 0 0 1 -12 -12 v-50 a12 12 0 0 1 12 -12 z"
        fill="#0b0b1a" stroke="url(#grad)" stroke-width="1.6" stroke-opacity="0.85"/>
  <g stroke="#8b90a8" stroke-width="4" stroke-linecap="round" stroke-opacity="0.75">
    <line x1="52" y1="68" x2="164" y2="68"/>
    <line x1="52" y1="84" x2="140" y2="84"/>
  </g>

  <!-- SQL transform (middle) -->
  <path d="M210 96 H272" fill="none" stroke="url(#grad)" stroke-width="2" stroke-dasharray="1 10" stroke-linecap="round" stroke-opacity="0.85"/>
  <text x="241" y="80" font-family="monospace" font-size="14" font-weight="700" fill="#22d3ee" text-anchor="middle">&#123; &#125;</text>
  <path d="M266 90 l8 6 -8 6" fill="none" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- database cylinder (right) -->
  <g transform="translate(360 44)">
    <path d="M0 12 v68 a44 12 0 0 0 88 0 v-68" fill="#0b0b1a" stroke="url(#grad)" stroke-width="1.6"/>
    <ellipse cx="44" cy="12" rx="44" ry="12" fill="#0b0b1a" stroke="url(#grad)" stroke-width="1.6"/>
    <path d="M0 40 a44 12 0 0 0 88 0" fill="none" stroke="#8b5cf6" stroke-width="1.2" stroke-opacity="0.5"/>
    <path d="M0 64 a44 12 0 0 0 88 0" fill="none" stroke="#8b5cf6" stroke-width="1.2" stroke-opacity="0.5"/>
  </g>

  <!-- results check -->
  <circle cx="500" cy="118" r="14" fill="none" stroke="#34d399" stroke-width="2"/>
  <path d="M493 118 l5 5 9 -11" fill="none" stroke="#34d399" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

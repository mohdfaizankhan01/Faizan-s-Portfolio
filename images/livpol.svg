<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 180" width="580" height="180" role="img" aria-label="Crowd density with suppressed facial identity illustration">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.6" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glowC" cx="15%" cy="25%" r="60%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.28"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowV" cx="88%" cy="85%" r="65%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.30"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="29" height="29" patternUnits="userSpaceOnUse">
      <path d="M29 0H0V29" fill="none" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.09"/>
    </pattern>
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#8b5cf6"/>
    </radialGradient>
  </defs>

  <rect width="580" height="180" fill="#0a0a16"/>
  <rect width="580" height="180" fill="url(#glowC)"/>
  <rect width="580" height="180" fill="url(#glowV)"/>
  <rect width="580" height="180" fill="url(#grid)"/>

  <!-- crowd density dots (left) -->
  <g fill="url(#dot)">
    <circle cx="50"  cy="48"  r="5" opacity="0.9"/><circle cx="86" cy="42" r="4" opacity="0.7"/>
    <circle cx="120" cy="52"  r="5" opacity="0.85"/><circle cx="158" cy="44" r="4" opacity="0.6"/>
    <circle cx="60"  cy="86"  r="5" opacity="0.85"/><circle cx="98" cy="82" r="5" opacity="0.9"/>
    <circle cx="134" cy="90"  r="4" opacity="0.7"/><circle cx="170" cy="82" r="5" opacity="0.8"/>
    <circle cx="46"  cy="124" r="4" opacity="0.7"/><circle cx="84" cy="128" r="5" opacity="0.85"/>
    <circle cx="122" cy="126" r="5" opacity="0.9"/><circle cx="160" cy="122" r="4" opacity="0.65"/>
    <circle cx="196" cy="108" r="4" opacity="0.6"/><circle cx="200" cy="66" r="4" opacity="0.55"/>
  </g>

  <!-- frequency / Fourier waves (middle) -->
  <path d="M230 90 q 18 -34 36 0 t 36 0 t 36 0" fill="none" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.8"/>
  <path d="M230 90 q 12 20 24 0 t 24 0 t 24 0 t 24 0 t 24 0" fill="none" stroke="#8b5cf6" stroke-width="1.6" stroke-opacity="0.6"/>

  <!-- privacy: pixelated / suppressed face (right) -->
  <g transform="translate(430 48)">
    <rect x="-4" y="-4" width="96" height="96" rx="10" fill="none" stroke="url(#grad)" stroke-width="1.6" stroke-opacity="0.8"/>
    <g fill="#5a5f78">
      <rect x="6"  y="6"  width="20" height="20" opacity="0.5"/><rect x="30" y="6"  width="20" height="20" opacity="0.8"/><rect x="54" y="6"  width="20" height="20" opacity="0.4"/>
      <rect x="6"  y="30" width="20" height="20" opacity="0.7"/><rect x="30" y="30" width="20" height="20" opacity="0.35"/><rect x="54" y="30" width="20" height="20" opacity="0.65"/>
      <rect x="6"  y="54" width="20" height="20" opacity="0.45"/><rect x="30" y="54" width="20" height="20" opacity="0.75"/><rect x="54" y="54" width="20" height="20" opacity="0.5"/>
    </g>
    <!-- privacy slash -->
    <line x1="4" y1="84" x2="84" y2="4" stroke="#34d399" stroke-width="3" stroke-linecap="round" stroke-opacity="0.85"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 180" width="580" height="180" role="img" aria-label="Voice to accessible route illustration">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.6" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glowC" cx="18%" cy="20%" r="60%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowV" cx="88%" cy="90%" r="65%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="29" height="29" patternUnits="userSpaceOnUse">
      <path d="M29 0H0V29" fill="none" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.09"/>
    </pattern>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- base + ambient glows + grid -->
  <rect width="580" height="180" fill="#0a0a16"/>
  <rect width="580" height="180" fill="url(#glowC)"/>
  <rect width="580" height="180" fill="url(#glowV)"/>
  <rect width="580" height="180" fill="url(#grid)"/>

  <!-- voice waveform (left) -->
  <g fill="url(#grad)">
    <rect x="40"  y="74" width="5" height="32" rx="2.5"/>
    <rect x="52"  y="60" width="5" height="60" rx="2.5"/>
    <rect x="64"  y="46" width="5" height="88" rx="2.5"/>
    <rect x="76"  y="66" width="5" height="48" rx="2.5"/>
    <rect x="88"  y="52" width="5" height="76" rx="2.5"/>
    <rect x="100" y="72" width="5" height="36" rx="2.5"/>
    <rect x="112" y="62" width="5" height="56" rx="2.5"/>
  </g>

  <!-- flowing route -->
  <path d="M132 90 C 200 40, 250 140, 330 96 S 450 60, 520 92"
        fill="none" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"
        filter="url(#soft)" opacity="0.55"/>
  <path d="M132 90 C 200 40, 250 140, 330 96 S 450 60, 520 92"
        fill="none" stroke="url(#grad)" stroke-width="2.2" stroke-linecap="round"
        stroke-dasharray="1 12" stroke-opacity="0.9"/>

  <!-- intent node (middle) -->
  <circle cx="330" cy="96" r="16" fill="#0a0a16" stroke="url(#grad)" stroke-width="2"/>
  <circle cx="330" cy="96" r="5" fill="url(#grad)"/>
  <circle cx="330" cy="96" r="26" fill="none" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.25"/>

  <!-- stop node -->
  <circle cx="220" cy="83" r="5.5" fill="#22d3ee"/>
  <circle cx="220" cy="83" r="11" fill="none" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>

  <!-- destination pin (right) -->
  <g transform="translate(520 92)">
    <path d="M0 -22 C 12 -22, 12 -6, 0 8 C -12 -6, -12 -22, 0 -22 Z" fill="url(#grad)"/>
    <circle cx="0" cy="-14" r="5" fill="#0a0a16"/>
  </g>

  <!-- accessibility mark (subtle, bottom-left) -->
  <g transform="translate(58 150)" fill="none" stroke="#34d399" stroke-width="2" stroke-opacity="0.55" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="0" cy="-9" r="2.4" fill="#34d399" stroke="none"/>
    <path d="M-6 -2 H6 M0 -3 V6 M0 6 L-4 12 M0 6 L4 12"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 180" width="580" height="180" role="img" aria-label="Knowledge graph to cited answer illustration">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.6" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glowC" cx="15%" cy="25%" r="60%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.28"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowV" cx="88%" cy="85%" r="65%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.30"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="29" height="29" patternUnits="userSpaceOnUse">
      <path d="M29 0H0V29" fill="none" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.09"/>
    </pattern>
  </defs>

  <rect width="580" height="180" fill="#0a0a16"/>
  <rect width="580" height="180" fill="url(#glowC)"/>
  <rect width="580" height="180" fill="url(#glowV)"/>
  <rect width="580" height="180" fill="url(#grid)"/>

  <!-- knowledge graph (left) -->
  <g stroke="url(#grad)" stroke-width="1.4" stroke-opacity="0.55">
    <line x1="140" y1="90" x2="88"  y2="52"/>
    <line x1="140" y1="90" x2="196" y2="48"/>
    <line x1="140" y1="90" x2="80"  y2="120"/>
    <line x1="140" y1="90" x2="150" y2="138"/>
    <line x1="140" y1="90" x2="214" y2="104"/>
    <line x1="196" y1="48" x2="214" y2="104"/>
    <line x1="88"  y1="52" x2="80"  y2="120"/>
  </g>
  <g fill="#0a0a16" stroke="url(#grad)" stroke-width="2">
    <circle cx="88"  cy="52"  r="8"/>
    <circle cx="196" cy="48"  r="7"/>
    <circle cx="80"  cy="120" r="7"/>
    <circle cx="150" cy="138" r="6"/>
    <circle cx="214" cy="104" r="8"/>
  </g>
  <circle cx="140" cy="90" r="13" fill="#0a0a16" stroke="url(#grad)" stroke-width="2.4"/>
  <circle cx="140" cy="90" r="4.5" fill="url(#grad)"/>

  <!-- flow to answer -->
  <path d="M228 96 H332" fill="none" stroke="url(#grad)" stroke-width="2" stroke-dasharray="1 10" stroke-linecap="round" stroke-opacity="0.85"/>
  <path d="M326 90 l8 6 -8 6" fill="none" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- cited answer card (right) -->
  <rect x="352" y="46" width="176" height="92" rx="12" fill="#0b0b1a" stroke="url(#grad)" stroke-width="1.6" stroke-opacity="0.85"/>
  <g stroke="#8b90a8" stroke-width="4" stroke-linecap="round" stroke-opacity="0.7">
    <line x1="372" y1="70" x2="500" y2="70"/>
    <line x1="372" y1="86" x2="486" y2="86"/>
    <line x1="372" y1="102" x2="504" y2="102"/>
  </g>
  <!-- citation marker -->
  <circle cx="372" cy="120" r="9" fill="none" stroke="#34d399" stroke-width="1.6"/>
  <text x="372" y="124" font-family="monospace" font-size="10" fill="#34d399" text-anchor="middle">1</text>
  <line x1="388" y1="120" x2="470" y2="120" stroke="#34d399" stroke-width="3" stroke-linecap="round" stroke-opacity="0.55"/>
</svg>
